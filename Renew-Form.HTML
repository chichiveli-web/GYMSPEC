<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Renew Your Gym Subscription</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f9f9f9;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.1);
    }
    input, button {
      display: block;
      width: 100%;
      margin-bottom: 15px;
      padding: 8px;
    }
    button {
      background: #d32f2f;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Renew Your Gym Subscription</h2>

    <p>Thank you for choosing our gym. Please confirm your details and renew your plan.</p>

    <form id="renewForm">
      <input type="hidden" id="memberInput" name="member_id" value="">
      <input type="hidden" id="emailInput" name="email" value="">

      <label for="name">Name</label>
      <input type="text" id="name" name="full_name" required>

      <label for="plan">Plan</label>
      <input type="text" id="plan" name="plan" placeholder="e.g., Basic, Premium" required>

      <label for="duration">Renewal duration (months)</label>
      <input type="number" id="duration" name="months" min="1" value="1" required>

      <button type="submit">Submit Renewal</button>
    </form>

    <p id="status"></p>
  </div>

  <script>
    // Read URL params
    const params = new URLSearchParams(window.location.search);
    const memberId = params.get('member');
    const email = params.get('email');

    document.getElementById('memberInput').value = memberId || '';
    document.getElementById('emailInput').value = email || '';

    const form = document.getElementById('renewForm');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = new FormData(form);
      const json = Object.fromEntries(data.entries());

      try {
        const response = await fetch('http://localhost:5678/webhook-test/renew', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(json)
        });

        if (response.ok) {
          status.innerText = 'Renewal submitted successfully!';
          status.style.color = 'green';
          form.reset();
        } else {
          status.innerText = 'Something went wrong. Please try again.';
          status.style.color = 'red';
        }
      } catch (err) {
        status.innerText = 'Network error. Please check your connection.';
        status.style.color = 'red';
      }
    });
  </script>
</body>
</html>
